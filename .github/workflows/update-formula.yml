name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update vela formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA_X86_64_LINUX: ${{ github.event.client_payload.x86_64_linux }}
          SHA_AARCH64_LINUX: ${{ github.event.client_payload.aarch64_linux }}
          SHA_X86_64_MACOS: ${{ github.event.client_payload.x86_64_macos }}
          SHA_AARCH64_MACOS: ${{ github.event.client_payload.aarch64_macos }}
        run: |
          # Strip "v" prefix for formula version
          FORMULA_VERSION="${VERSION#v}"

          cat > Formula/vela.rb << RUBY
          class Vela < Formula
            desc "WASM Component Model optimizer"
            homepage "https://github.com/mizzy/vela"
            version "${FORMULA_VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/mizzy/vela/releases/download/${VERSION}/vela-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_MACOS}"
              else
                url "https://github.com/mizzy/vela/releases/download/${VERSION}/vela-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_MACOS}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/mizzy/vela/releases/download/${VERSION}/vela-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_AARCH64_LINUX}"
              else
                url "https://github.com/mizzy/vela/releases/download/${VERSION}/vela-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            def install
              bin.install "vela"
            end

            test do
              assert_match "vela", shell_output("#{bin}/vela --version")
            end
          end
          RUBY

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/vela.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vela.rb
          git commit -m "Update vela to ${VERSION}"
          git push
